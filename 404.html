<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Page Not Found — Minicuration</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a0a;--crimson:#8b1a1a;--sky:#5fc4e0;--text:#f0ebe3;--muted:#888;--border:rgba(255,255,255,.08);}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:20px 48px;background:rgba(10,10,10,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.22em;text-transform:lowercase;color:var(--text);text-decoration:none;}
    .nav-links{display:flex;gap:36px;list-style:none;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;letter-spacing:.1em;text-transform:uppercase;transition:color .3s;}
    .nav-links a:hover{color:var(--text);}
    .nav-cta{background:var(--crimson)!important;color:var(--text)!important;padding:8px 20px;border-radius:2px;}
    .not-found{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:140px 24px 80px;}
    .eyebrow{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--crimson);margin-bottom:24px;}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,6vw,72px);font-weight:300;line-height:1.08;margin-bottom:20px;}
    .sub{font-size:16px;color:var(--muted);max-width:440px;line-height:1.75;margin-bottom:48px;}
    .btn-primary{display:inline-block;background:var(--crimson);color:var(--text);text-decoration:none;padding:14px 36px;font-size:13px;letter-spacing:.15em;text-transform:uppercase;border-radius:2px;transition:background .3s;}
    .btn-primary:hover{background:#a82020;}
    footer{padding:40px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;border-top:1px solid var(--border);}
    .footer-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:.2em;text-transform:lowercase;color:var(--text);text-decoration:none;}
    .footer-links{display:flex;gap:24px;list-style:none;flex-wrap:wrap;}
    .footer-links a{color:var(--muted);text-decoration:none;font-size:12px;letter-spacing:.1em;text-transform:uppercase;transition:color .3s;}
    .footer-links a:hover{color:var(--text);}
    .footer-copy{font-size:11px;color:var(--muted);}
    @media(max-width:768px){nav{padding:16px 20px;}.nav-links{display:none;}footer{flex-direction:column;text-align:center;padding:28px 20px;}}
  </style>
</head>
<body>
  <nav>
    <a href="/index.html" class="nav-logo">minicuration</a>
    <ul class="nav-links">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="shop.html" class="nav-cta">Shop Prints</a></li>
    </ul>
  </nav>

  <div class="not-found">
    <p class="eyebrow">404</p>
    <h1>This edition has sold out.</h1>
    <p class="sub">The page you were looking for doesn't exist or has moved.</p>
    <a href="/shop.html" class="btn-primary">Browse the Collection</a>
  </div>

  <footer>
    <a href="/index.html" class="footer-logo">minicuration</a>
    <ul class="footer-links">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="policies.html">Policies</a></li>
      <li><a href="https://jfeelgood.com" target="_blank" rel="noopener">jfeelgood.com</a></li>
    </ul>
    <span class="footer-copy">&copy; 2026 Minicuration. All rights reserved.</span>
  </footer>
</body>
</html>
