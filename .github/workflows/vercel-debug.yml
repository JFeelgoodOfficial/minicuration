# TEMPORARY diagnostic workflow — delete after the Vercel deploy failure is
# resolved. Diagnoses "Resource provisioning failed" (BUILD_FAILED before any
# build step): inspects project resourceConfig + team plan, resets a
# non-standard build machine type to standard if found, then retries a
# PREVIEW deploy (never touches production).
name: Vercel Debug Deploy

on:
  push:
    branches: [claude/home-pricing-correction-u7e9hx]

jobs:
  debug-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inspect project config and fix build machine type
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_Lbkrq0XowJ4UKneBKGtQFmTE
          VERCEL_PROJECT_ID: prj_Yy0vEgmuTLeYLxfYD8Jr14QA3gx2
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set"; exit 0; fi
          cat > /tmp/fix.mjs <<'EOF'
          const token = process.env.VERCEL_TOKEN;
          const team = process.env.VERCEL_ORG_ID;
          const proj = process.env.VERCEL_PROJECT_ID;
          const h = { Authorization: `Bearer ${token}` };

          const p = await (await fetch(`https://api.vercel.com/v9/projects/${proj}?teamId=${team}`, { headers: h })).json();
          console.log('framework:', p.framework, '| nodeVersion:', p.nodeVersion);
          console.log('buildCommand:', p.buildCommand, '| installCommand:', p.installCommand, '| outputDirectory:', p.outputDirectory);
          console.log('resourceConfig:', JSON.stringify(p.resourceConfig));
          console.log('paused:', p.paused, '| v0:', p.v0);

          const t = await (await fetch(`https://api.vercel.com/v2/teams/${team}`, { headers: h })).json();
          console.log('team plan:', t?.billing?.plan ?? t?.plan, '| team:', t?.name);

          const m = p.resourceConfig?.buildMachineType;
          if (m && m !== 'standard') {
            console.log(`buildMachineType is "${m}" — resetting to "standard"`);
            const r = await fetch(`https://api.vercel.com/v9/projects/${proj}?teamId=${team}`, {
              method: 'PATCH',
              headers: { ...h, 'Content-Type': 'application/json' },
              body: JSON.stringify({ resourceConfig: { buildMachineType: 'standard' } }),
            });
            const body = await r.text();
            console.log('PATCH status:', r.status, body.slice(0, 500));
          } else {
            console.log(`buildMachineType is "${m}" — no patch needed on that field`);
          }
          EOF
          node /tmp/fix.mjs

      - name: Retry preview deploy and report final state
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_Lbkrq0XowJ4UKneBKGtQFmTE
          VERCEL_PROJECT_ID: prj_Yy0vEgmuTLeYLxfYD8Jr14QA3gx2
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set"; exit 0; fi
          echo "=== vercel deploy (preview, retry) ==="
          url=$(npx vercel deploy --token="$VERCEL_TOKEN" --yes 2>deploy-stderr.txt) || true
          echo "deployment url: $url"
          cat deploy-stderr.txt || true
          if [ -n "$url" ]; then
            host="${url#https://}"
            curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$host?teamId=$VERCEL_ORG_ID" \
              | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);console.log(JSON.stringify({readyState:j.readyState,errorCode:j.errorCode,errorMessage:j.errorMessage},null,2))})"
          fi
