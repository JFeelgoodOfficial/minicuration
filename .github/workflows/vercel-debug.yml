# TEMPORARY workflow — delete after the Vercel deploy failure is resolved.
# Vercel deploys recovered (both fresh-project and old-project preview
# deploys went READY). This run ships PRODUCTION: deploys main (which
# contains the $23 price fix) to the original minicuration project that
# serves minicuration.com, then verifies the live site.
name: Vercel Debug Deploy

on:
  push:
    branches: [claude/home-pricing-correction-u7e9hx]

jobs:
  ship-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_Lbkrq0XowJ4UKneBKGtQFmTE
      VERCEL_PROJECT_ID: prj_Yy0vEgmuTLeYLxfYD8Jr14QA3gx2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Production deploy of main to minicuration.com
        run: |
          set +e
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set"; exit 0; fi
          echo "deploying commit: $(git rev-parse --short HEAD) — $(git log -1 --format=%s)"
          npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes >/tmp/prod.txt 2>&1
          echo "--- deploy output tail ---"; tail -8 /tmp/prod.txt
          url=$(grep -oE 'https://[a-z0-9.-]+\.vercel\.app' /tmp/prod.txt | tail -1)
          echo "PROD_URL: $url"
          if [ -n "$url" ]; then
            curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/${url#https://}?teamId=$VERCEL_ORG_ID" \
              | python3 -c "import json,sys; j=json.load(sys.stdin); print('PROD_STATE:', j.get('readyState'), '|', j.get('errorCode'), '|', j.get('errorMessage'))"
          fi
          exit 0

      - name: Verify live site shows $23
        run: |
          set +e
          sleep 20
          html=$(curl -sL https://minicuration.com)
          echo "occurrences of \$23: $(echo "$html" | grep -o '\$23' | wc -l)"
          echo "occurrences of \$24: $(echo "$html" | grep -o '\$24' | wc -l)"
          echo "$html" | grep -oE '<title>[^<]*</title>'
          exit 0
