# TEMPORARY diagnostic workflow — delete after the Vercel deploy failure is
# resolved. Tests two hypotheses with full CLI output captured:
#   FRESH: deploy full repo (including .claude) to the new minicuration-live
#          project — READY means the old project is wedged.
#   STRIPPED: deploy to the OLD project with .claude/ and .github/ removed —
#          READY means content from PR #21 (June 9) is what Vercel rejects.
# Preview-only on both; production untouched.
name: Vercel Debug Deploy

on:
  push:
    branches: [claude/home-pricing-correction-u7e9hx]

jobs:
  debug-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_Lbkrq0XowJ4UKneBKGtQFmTE
      OLD_PROJECT_NAME: minicuration
      NEW_PROJECT_NAME: minicuration-live
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "FRESH: full repo to minicuration-live"
        run: |
          set +e
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set"; exit 0; fi
          npx vercel link --yes --project "$NEW_PROJECT_NAME" --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN" 2>&1 | tail -3
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN" 2>&1 | tail -3
          npx vercel build --token="$VERCEL_TOKEN" 2>&1 | tail -2
          npx vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes >/tmp/fresh.txt 2>&1
          echo "--- deploy output tail ---"; tail -8 /tmp/fresh.txt
          url=$(grep -oE 'https://[a-z0-9.-]+\.vercel\.app' /tmp/fresh.txt | tail -1)
          echo "FRESH_URL: $url"
          if [ -n "$url" ]; then
            curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/${url#https://}?teamId=$VERCEL_ORG_ID" \
              | python3 -c "import json,sys; j=json.load(sys.stdin); print('FRESH_STATE:', j.get('readyState'), '|', j.get('errorCode'), '|', j.get('errorMessage'))"
          fi
          exit 0

      - name: "STRIPPED: no .claude/.github to OLD project"
        run: |
          set +e
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set"; exit 0; fi
          rm -rf .claude .github .vercel
          npx vercel link --yes --project "$OLD_PROJECT_NAME" --scope "$VERCEL_ORG_ID" --token="$VERCEL_TOKEN" 2>&1 | tail -3
          npx vercel deploy --token="$VERCEL_TOKEN" --yes >/tmp/stripped.txt 2>&1
          echo "--- deploy output tail ---"; tail -8 /tmp/stripped.txt
          url=$(grep -oE 'https://[a-z0-9.-]+\.vercel\.app' /tmp/stripped.txt | tail -1)
          echo "STRIPPED_URL: $url"
          if [ -n "$url" ]; then
            curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/${url#https://}?teamId=$VERCEL_ORG_ID" \
              | python3 -c "import json,sys; j=json.load(sys.stdin); print('STRIPPED_STATE:', j.get('readyState'), '|', j.get('errorCode'), '|', j.get('errorMessage'))"
          fi
          exit 0
