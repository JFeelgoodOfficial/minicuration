# TEMPORARY diagnostic workflow — delete after the Vercel deploy failure is
# resolved. Root error: BUILD_FAILED / "Resource provisioning failed" before
# any build step. This run builds locally on the runner and deploys
# --prebuilt, which skips Vercel build machine provisioning entirely.
# Preview-only; production untouched.
name: Vercel Debug Deploy

on:
  push:
    branches: [claude/home-pricing-correction-u7e9hx]

jobs:
  debug-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Local build + deploy --prebuilt (skips build machine)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_Lbkrq0XowJ4UKneBKGtQFmTE
          VERCEL_PROJECT_ID: prj_Yy0vEgmuTLeYLxfYD8Jr14QA3gx2
        run: |
          set +e
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set"; exit 0; fi

          echo "=== vercel pull ==="
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN" 2>&1 | tail -5

          echo "=== vercel build (on this runner) ==="
          npx vercel build --token="$VERCEL_TOKEN" 2>&1 | tail -40

          echo "=== vercel deploy --prebuilt ==="
          url=$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes 2>&1 | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' | tail -1)
          echo "PREVIEW_URL: $url"

          if [ -n "$url" ]; then
            host="${url#https://}"
            curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$host?teamId=$VERCEL_ORG_ID" \
              | python3 -c "import json,sys; j=json.load(sys.stdin); print('FINAL_STATE:', j.get('readyState'), '| errorCode:', j.get('errorCode'), '| errorMessage:', j.get('errorMessage'))"
          else
            echo "FINAL_STATE: NO_URL"
          fi
          exit 0
